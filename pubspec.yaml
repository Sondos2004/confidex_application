name: confidex
description: AI-powered presentation video coaching app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  smooth_page_indicator: ^1.1.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  image_picker: ^1.1.2
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.3
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: 6.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
